- name: Chargement des variables du fichier de variables d'environnement
  community.sops.load_vars:
    file: "{{ playbook_dir }}/../env.global.yml"
    expressions: lazy-evaluation
  tags: always

- name: Chargement des variables du fichier d'habilitations avec SOPS
  community.sops.load_vars:
    file: "{{ habilitations_file_sops }}"
    expressions: lazy-evaluation
  tags: always

- import_tasks: external-variables.yml
  tags: always

- set_fact:
    public_interface_ip: "{{ansible_default_ipv4.address|default(ansible_all_ipv4_addresses[0]) }}"
  tags: always

- name: Récupération du nom de l'interface réseau publique
  shell: "ip -br a | grep {{ public_interface_ip }} | awk '{print $1}'"
  register: public_interface_name
  tags: always

- set_fact:
    public_interface_name: "{{ public_interface_name.stdout }}"  
  tags: always

- name: Récupération de l'adresse MAC de l'interface réseau publique
  shell: "ip -br l show {{ public_interface_name }} | awk '{print $3}'"
  register: public_interface_mac
  tags: always

- set_fact:
    public_interface_mac: "{{ public_interface_mac.stdout }}"
  tags: always

- name: Récupération de l'adresse IP de la passerelle par défaut
  shell: "ip r | grep default | awk '{print $3}'"
  register: public_interface_gateway
  tags: always

- set_fact:
    public_interface_gateway: "{{ public_interface_gateway.stdout }}"
  tags: always

- import_tasks: configure-kernel.yml
  tags: kernel
  when: add_kernel_modification == true

- import_tasks: patch-dirtyfrag.yml
  tags: dirtyfrag

- import_tasks: configure-nvidia-gpu.yml
  tags: nvidia
  when: gpu_instance == 'true'

- import_tasks: configure-swap.yml
  tags: swap

- import_tasks: configure-network.yml
  tags: network

- import_tasks: configure-firewall.yml
  tags: firewall

- import_tasks: configure-dns.yml
  tags: dns

- import_tasks: configure-ips-blacklist.yml
  tags: ipsblacklist

- import_tasks: configure-system.yml
  tags: system

- import_tasks: configure-ssh.yml
  tags: ssh

- import_tasks: configure-docker.yml
  tags: docker

- import_tasks: configure-users.yml
  tags: users

- import_tasks: configure-auth.yml
  tags: auth

- import_tasks: renew-ssl-certificate.yml
  tags: ssl

- import_tasks: install-app.yml
  tags: app

- import_tasks: configure-fail2ban.yml
  tags: fail2ban

- import_tasks: generate-gpg-key.yml
  tags: gpg

- import_tasks: configure-logrotate.yml
  tags: logrotate
