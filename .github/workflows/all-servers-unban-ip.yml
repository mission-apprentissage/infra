name: All Servers Unban IP
on:
  workflow_dispatch:
    inputs:
      ip:
        description: The IP to unban
        type: string
        required: true

jobs:
  setup:
    strategy:
      fail-fast: false
      matrix:
        product:
          [
            "api",
            "bal",
            "data",
            "lab",
            "lba",
            "monitoring",
            "tdb",
            "vpn",
          ]
        environment:
          [
            "production",
            "recette",
            "preview",
            "preprod"
          ]
    name: Unban ${{ inputs.ip }} on ${{ matrix.product }}-${{ matrix.environment }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          name: github_actions
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          known_hosts: ${{ vars[format('{0}_SSH_KNOWN_HOSTS', matrix.product)] }}
          config: |
            Host *
              IdentityFile ~/.ssh/github_actions

      - name: Run playbook
        run: ".bin/infra system:unban ${{ matrix.product }} ${{ matrix.environment }} ${{ inputs.ip }}"
        env:
          ANSIBLE_REMOTE_USER: deploy
          ANSIBLE_BECOME_PASS: ${{ secrets.DEPLOY_PASS }}

      - name: Encrypt logs
        run: .bin/infra app:deploy:log:encrypt
        if: always()

      - name: Upload logs artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.product }}-${{ matrix.environment }}
          path: /tmp/deploy.log.gpg

      - name: Add Job summary
        if: always()
        run: echo 'You can get logs using `.bin/infra app:deploy:log:decrypt ${{ github.run_id }} ${{ matrix.product }}-${{ matrix.environment }}`' >> $GITHUB_STEP_SUMMARY

      - name: Notify failure on Slack
        uses: slackapi/slack-github-action@v3
        if: failure()
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_ALERTS }}
          webhook-type: incoming-webhook
          payload: |
            attachments:
              - color: "danger"
                text: "<!channel> *[${{ matrix.product }}-${{ matrix.environment }}]* *${{ github.workflow }}* failed!\n\nYou can get error logs using :\n\n`.bin/infra app:deploy:log:decrypt ${{ github.run_id }} ${{ matrix.product }}-${{ matrix.environment }}`"
                fields:
                  - title: ""
                    value: ""
                  - title: "Branch"
                    value: "<${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}|${{ github.ref_name }}>"
                  - title: "Commit"
                    value: "<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                footer: "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
