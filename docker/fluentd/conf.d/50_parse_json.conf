<filter docker.json.*.*.*>
  @type parser
  key_name log
  reserve_time true
  reserve_data true
  emit_invalid_record_to_error false
  remove_key_name_field true
  inject_key_prefix "log_"

  <parse>
    @type json
  </parse>
</filter>

<filter docker.json.*.*.*>
  @type record_transformer
  enable_ruby true
  <record>
    level ${l = record["log_level"]; {10 => "trace", 20 => "debug", 30 => "info", 40 => "warn", 50 => "error", 60 => "fatal"}[l.to_i] || (l.to_s.strip.empty? ? "unknown" : l.to_s.downcase)}
  </record>
</filter>

<filter docker.*.**>
  @type record_transformer
  <record>
    tag ${tag}
  </record>
</filter>
